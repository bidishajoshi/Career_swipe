{% extends "base.html" %}
{% block title %}Seeker Login – CareerSwipe{% endblock %}
{% block content %}
<div class="auth-wrap auth-login-wrap seeker-theme">
  <div class="auth-card auth-login-card">

    <div class="auth-header">
      <span class="role-badge badge-seeker">🔵 Job Seeker</span>
      <h2>Welcome back</h2>
      <p>Sign in to your account to find your next opportunity</p>
    </div>

    <form method="POST" class="auth-form" id="loginSeekerForm">
      {{ csrf_token() }}
      <div class="field">
        <label for="login-email">Email address</label>
        <input type="email" id="login-email" name="email" required autofocus
               placeholder="you@example.com">
      </div>
      <div class="field">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" name="password" required
               placeholder="••••••••">
      </div>
      <button type="submit" class="btn btn-primary btn-full" style="margin-top:0.5rem;">
        Sign In →
      </button>
      <p class="auth-link">
        Don't have an account?
        <a href="{{ url_for('register_seeker') }}">Create one free</a>
      </p>
      <p class="auth-link" style="margin-top:0.5rem;">
        A company?
        <a href="{{ url_for('login_company') }}" style="color:var(--accent);">Company Login</a>
      </p>
    </form>

  </div>
</div>
{% endblock %}
