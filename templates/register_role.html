{% extends "base.html" %}
{% block title %}Create Profile – CareerSwipe{% endblock %}
{% block content %}

<div class="auth-wrap seeker-theme">
  <div class="auth-card">
    <div class="auth-header">
      <h2>Choose your role</h2>
      <p>Select how you will use CareerSwipe.</p>
    </div>

    <div class="hero-btns" style="margin-top: 0;">
      <a href="{{ url_for('upload_resume_step') }}" class="btn btn-primary">
        🚀 Job Seeker
      </a>
      <a href="{{ url_for('register_company') }}" class="btn btn-company">
        🏢 Company
      </a>
    </div>

    <p class="auth-link" style="margin-top: 1.5rem; text-align: center;">
      Already have an account?
      <a href="{{ url_for('login_seeker') }}">Seeker login</a> ·
      <a href="{{ url_for('login_company') }}">Company login</a>
    </p>
  </div>
</div>

{% endblock %}
