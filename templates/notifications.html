{% extends "base.html" %}

{% block title %}Notifications - CareerSwipe{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row">
        <div class="col-lg-8 mx-auto">
            <div class="card shadow-lg border-0">
                <div class="card-header bg-gradient text-white" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                    <h2 class="mb-0">
                        <i class="bi bi-bell-fill"></i> Notifications
                        <span class="badge bg-danger float-end" id="unread-badge" style="display: none;">0</span>
                    </h2>
                </div>

                <div class="card-body p-0">
                    <!-- Tabs for filtering -->
                    <div class="btn-group w-100" role="group">
                        <button type="button" class="btn btn-light border-0 notification-tab active" data-filter="all">
                            All Notifications
                        </button>
                        <button type="button" class="btn btn-light border-0 notification-tab" data-filter="unread">
                            Unread
                        </button>
                    </div>

                    <!-- Action buttons -->
                    <div class="p-3 border-bottom d-flex gap-2">
                        <button class="btn btn-sm btn-outline-primary" id="mark-all-read-btn">
                            <i class="bi bi-check-all"></i> Mark All as Read
                        </button>
                        <button class="btn btn-sm btn-outline-secondary" id="refresh-btn">
                            <i class="bi bi-arrow-clockwise"></i> Refresh
                        </button>
                    </div>

                    <!-- Notifications list -->
                    <div id="notifications-container" class="notification-list">
                        <div class="text-center p-5">
                            <p class="text-muted">Loading notifications...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Toast notification -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index: 11;">
    <div id="notification-toast" class="toast" role="alert">
        <div class="toast-header bg-success text-white">
            <strong class="me-auto" id="toast-title">Success</strong>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="toast"></button>
        </div>
        <div class="toast-body" id="toast-body">
            Notification updated successfully.
        </div>
    </div>
</div>

<style>
.notification-item {
    border-left: 4px solid #667eea;
    padding: 1rem;
    margin-bottom: 0.5rem;
    cursor: pointer;
    transition: background-color 0.3s ease;
    position: relative;
}

.notification-item:hover {
    background-color: #f8f9fa;
}

.notification-item.unread {
    background-color: #f0f4ff;
    font-weight: 500;
}

.notification-badge {
    display: inline-block;
    width: 10px;
    height: 10px;
    background-color: #28a745;
    border-radius: 50%;
    margin-right: 0.5rem;
}

.notification-badge.unread {
    background-color: #dc3545;
}

.notification-time {
    font-size: 0.85rem;
    color: #6c757d;
}

.notification-tab {
    border-bottom: 3px solid transparent;
    margin-bottom: -3px;
    transition: all 0.3s ease;
}

.notification-tab.active {
    background-color: #f8f9fa !important;
    border-bottom-color: #667eea !important;
    color: #667eea !important;
}

.empty-state {
    text-align: center;
    padding: 3rem 1rem;
}

.empty-state-icon {
    font-size: 3rem;
    color: #ccc;
    margin-bottom: 1rem;
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
    let currentFilter = 'all';

    // Mark first tab as active
    document.querySelector('.notification-tab[data-filter="all"]').classList.add('active');

    // Load notifications on page load
    loadNotifications(currentFilter);

    // Tab filtering
    document.querySelectorAll('.notification-tab').forEach(tab => {
        tab.addEventListener('click', function() {
            document.querySelectorAll('.notification-tab').forEach(t => t.classList.remove('active'));
            this.classList.add('active');
            currentFilter = this.dataset.filter;
            loadNotifications(currentFilter);
        });
    });

    // Mark all as read
    document.getElementById('mark-all-read-btn').addEventListener('click', function() {
        markAllRead();
    });

    // Refresh button
    document.getElementById('refresh-btn').addEventListener('click', function() {
        loadNotifications(currentFilter);
    });

    // Auto-refresh notifications every 30 seconds
    setInterval(function() {
        if (currentFilter === 'all') {
            loadNotifications(currentFilter);
        }
    }, 30000);
});

function loadNotifications(filter = 'all') {
    const container = document.getElementById('notifications-container');
    let url = '/api/notifications?limit=50';

    if (filter === 'unread') {
        url += '&unread_only=true';
    }

    fetch(url)
        .then(response => response.json())
        .then(data => {
            if (!data.success || data.notifications.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">
                            <i class="bi bi-inbox"></i>
                        </div>
                        <p class="text-muted">No notifications to display</p>
                    </div>
                `;
                return;
            }

            let html = '';
            data.notifications.forEach(notif => {
                const date = new Date(notif.created_at);
                const timeAgo = getTimeAgo(date);
                const unreadClass = notif.is_read ? '' : 'unread';
                const badgeClass = notif.is_read ? '' : 'unread';

                html += `
                    <div class="notification-item ${unreadClass}" data-id="${notif.id}">
                        <div class="d-flex justify-content-between align-items-start">
                            <div class="flex-grow-1">
                                <span class="notification-badge ${badgeClass}"></span>
                                <h6 class="mb-1">${notif.title}</h6>
                                <p class="mb-2 text-muted">${notif.message}</p>
                                <div class="d-flex gap-2 align-items-center">
                                    <small class="notification-time">
                                        <i class="bi bi-clock"></i> ${timeAgo}
                                    </small>
                                    ${notif.action_url ? `
                                        <a href="${notif.action_url}" class="btn btn-sm btn-link">View →</a>
                                    ` : ''}
                                </div>
                            </div>
                            <div class="dropdown">
                                <button class="btn btn-sm btn-light" type="button" data-bs-toggle="dropdown">
                                    <i class="bi bi-three-dots-vertical"></i>
                                </button>
                                <ul class="dropdown-menu dropdown-menu-end">
                                    ${!notif.is_read ? `
                                        <li>
                                            <a class="dropdown-item" href="#" onclick="markAsRead(${notif.id}); return false;">
                                                <i class="bi bi-check"></i> Mark as Read
                                            </a>
                                        </li>
                                    ` : ''}
                                    <li>
                                        <a class="dropdown-item" href="#" onclick="archiveNotification(${notif.id}); return false;">
                                            <i class="bi bi-archive"></i> Archive
                                        </a>
                                    </li>
                                    <li>
                                        <a class="dropdown-item text-danger" href="#" onclick="deleteNotification(${notif.id}); return false;">
                                            <i class="bi bi-trash"></i> Delete
                                        </a>
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        })
        .catch(error => {
            console.error('Error loading notifications:', error);
            container.innerHTML = `
                <div class="alert alert-danger m-3">
                    Failed to load notifications. Please try again.
                </div>
            `;
        });
}

function markAsRead(notificationId) {
    fetch(`/api/notifications/${notificationId}/mark-read`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' }
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            showToast('Notification marked as read', 'success');
            loadNotifications('all');
        }
    })
    .catch(error => console.error('Error:', error));
}

function markAllRead() {
    fetch('/api/notifications/mark-all-read', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' }
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            showToast('All notifications marked as read', 'success');
            loadNotifications('all');
        }
    })
    .catch(error => console.error('Error:', error));
}

function archiveNotification(notificationId) {
    fetch(`/api/notifications/${notificationId}/archive`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' }
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            showToast('Notification archived', 'info');
            loadNotifications('all');
        }
    })
    .catch(error => console.error('Error:', error));
}

function deleteNotification(notificationId) {
    if (confirm('Are you sure you want to delete this notification?')) {
        fetch(`/api/notifications/${notificationId}`, {
            method: 'DELETE',
            headers: { 'Content-Type': 'application/json' }
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                showToast('Notification deleted', 'success');
                loadNotifications('all');
            }
        })
        .catch(error => console.error('Error:', error));
    }
}

function getTimeAgo(date) {
    const seconds = Math.floor((new Date() - date) / 1000);
    if (seconds < 60) return 'Just now';
    if (seconds < 3600) return Math.floor(seconds / 60) + 'm ago';
    if (seconds < 86400) return Math.floor(seconds / 3600) + 'h ago';
    return Math.floor(seconds / 86400) + 'd ago';
}

function showToast(message, type = 'success') {
    const toast = document.getElementById('notification-toast');
    const toastTitle = document.getElementById('toast-title');
    const toastBody = document.getElementById('toast-body');

    toastTitle.textContent = type === 'success' ? 'Success' : 'Info';
    toastBody.textContent = message;

    const bsToast = new bootstrap.Toast(toast);
    bsToast.show();
}

// Update unread count
function updateUnreadCount() {
    fetch('/api/notifications/unread-count')
        .then(response => response.json())
        .then(data => {
            const badge = document.getElementById('unread-badge');
            if (data.unread_count > 0) {
                badge.textContent = data.unread_count;
                badge.style.display = 'inline-block';
            } else {
                badge.style.display = 'none';
            }
        });
}

// Update unread count on page load
updateUnreadCount();

// Update every 60 seconds
setInterval(updateUnreadCount, 60000);
</script>
{% endblock %}
</div>

<style>
.notifs-history-container {
    padding: 0;
    overflow: hidden;
    margin-top: 1.5rem;
}
.notif-item-history {
    display: flex;
    align-items: center;
    gap: 1.25rem;
    padding: 1.25rem 2rem;
    border-bottom: 1px solid var(--border);
    transition: var(--transition);
    cursor: pointer;
}
.notif-item-history:hover {
    background: rgba(59, 130, 246, 0.05);
}
.notif-item-history.unread {
    background: rgba(59, 130, 246, 0.03);
    border-left: 4px solid var(--primary);
}
.notif-item-icon {
    font-size: 1.5rem;
    width: 48px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg-600);
    border-radius: var(--radius-md);
}
.notif-item-content {
    flex: 1;
}
.notif-message {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 4px;
}
.notif-time {
    font-size: 12px;
    color: var(--text-muted);
}
.unread-dot {
    width: 10px;
    height: 10px;
    background: var(--primary);
    border-radius: 50%;
    display: inline-block;
}
.notif-empty-state {
    padding: 5rem 2rem;
    text-align: center;
}
.empty-icon {
    font-size: 4rem;
    display: block;
    margin-bottom: 1.5rem;
    opacity: 0.3;
}
.mt-2 { margin-top: 2rem; }
</style>

<script>
document.addEventListener('DOMContentLoaded', () => {
    // Mark as read when clicking in history
    document.querySelectorAll('.notif-item-history.unread').forEach(item => {
        item.addEventListener('click', async () => {
            const id = item.dataset.id;
            try {
                const res = await fetch(`/api/notifications/read/${id}`, { method: 'POST' });
                if (res.ok) {
                    item.classList.remove('unread');
                    const dot = item.querySelector('.unread-dot');
                    if (dot) dot.remove();
                }
            } catch (err) { console.error(err); }
        });
    });

    // Mark all read in history
    const markAllBtn = document.getElementById('markAllReadHistory');
    if (markAllBtn) {
        markAllBtn.addEventListener('click', async () => {
            try {
                const res = await fetch('/api/notifications/read-all', { method: 'POST' });
                if (res.ok) {
                    document.querySelectorAll('.notif-item-history.unread').forEach(item => {
                        item.classList.remove('unread');
                        const dot = item.querySelector('.unread-dot');
                        if (dot) dot.remove();
                    });
                }
            } catch (err) { console.error(err); }
        });
    }
});
</script>
{% endblock %}
